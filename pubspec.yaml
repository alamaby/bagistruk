name: bagistruk
description: "BagiStruk — split-bill app with multi-photo OCR via Supabase Edge Functions."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management (code-generated). Pinned to the 3.x/4.x line — the 2.x
  # generator transitively depends on analyzer_plugin 0.12.0 which doesn't
  # compile against analyzer 7.x (Element2 migration).
  flutter_riverpod: ^3.0.0
  riverpod_annotation: ^3.0.0

  # Models
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # Navigation
  go_router: ^14.6.2

  # Responsiveness
  flutter_screenutil: ^5.9.3

  # Backend
  supabase_flutter: ^2.8.1

  # OCR pipeline support
  image_picker: ^1.1.2
  image: ^4.3.0

  # Animations / motion
  lottie: ^3.1.2
  flutter_animate: ^4.5.0

  # Misc
  flutter_dotenv: ^5.2.1
  intl: ^0.20.2
  uuid: ^4.5.1
  logger: ^2.5.0
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  build_runner: ^2.4.13
  freezed: ^3.0.0
  json_serializable: ^6.9.0
  riverpod_generator: ^3.0.0
  # custom_lint / riverpod_lint are intentionally omitted: their transitive
  # analyzer_plugin 0.12.0 does not yet support analyzer 7.x (Element2 migration).
  # Re-add once the ecosystem catches up — they're IDE-only and not needed for
  # code generation or `flutter analyze`.

flutter:
  generate: true
  uses-material-design: true
  assets:
    - .env
    - assets/lottie/
    - assets/images/
