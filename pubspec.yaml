name: bagistruk
description: "BagiStruk — split-bill app with multi-photo OCR via Supabase Edge Functions."
publish_to: 'none'
version: 0.10.1+14

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management (code-generated). Pinned to the 3.x/4.x line — the 2.x
  # generator transitively depends on analyzer_plugin 0.12.0 which doesn't
  # compile against analyzer 7.x (Element2 migration).
  flutter_riverpod: ^3.0.0
  riverpod_annotation: ^3.0.0

  # Models
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # Navigation
  go_router: ^14.6.2

  # Responsiveness
  flutter_screenutil: ^5.9.3

  # Backend
  google_sign_in: ^7.2.0
  google_mobile_ads: ^8.0.0
  in_app_purchase: ^3.2.0
  supabase_flutter: ^2.8.1

  # OCR pipeline support
  image_picker: ^1.1.2
  image: ^4.3.0

  # Animations / motion
  lottie: ^3.1.2
  flutter_animate: ^4.5.0

  # Misc
  flutter_dotenv: ^5.2.1
  intl: ^0.20.2
  uuid: ^4.5.1
  logger: ^2.5.0
  share_plus: ^10.1.4
  pdf: ^3.12.0
  package_info_plus: ^8.0.0
  url_launcher: ^6.3.0
  flutter_markdown_plus: ^1.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  build_runner: ^2.4.13
  freezed: ^3.0.0
  json_serializable: ^6.9.0
  riverpod_generator: ^3.0.0
  # custom_lint / riverpod_lint are intentionally omitted: their transitive
  # analyzer_plugin 0.12.0 does not yet support analyzer 7.x (Element2 migration).
  # Re-add once the ecosystem catches up — they're IDE-only and not needed for
  # code generation or `flutter analyze`.

flutter:
  generate: true
  uses-material-design: true
  assets:
    - .env
    - assets/lottie/
    - assets/images/
    - docs/privacy-policy.md
    - docs/terms-of-service.md

# Run `dart run flutter_launcher_icons` after editing this block.
# `image_path` is the legacy square icon (used on pre-Android 8 devices).
# `adaptive_icon_foreground` should be a 1024×1024 PNG with transparent
# padding so the system's circular/squircle mask doesn't clip the artwork —
# replace assets/images/icon_launcher.png with a properly padded version
# before the first Play Store upload (current asset is reused as a placeholder).
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/icon_launcher.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/icon_launcher.png"
  min_sdk_android: 21
