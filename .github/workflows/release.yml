name: Release Android Artifacts

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build split-per-ABI APKs and AAB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Resolve version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          BUILD_NAME="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "build_name=${BUILD_NAME}" >> "$GITHUB_OUTPUT"
          echo "build_number=${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Decode upload keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/upload-keystore.jks

      - name: Write android/key.properties
        env:
          KEY_ALIAS: ${{ vars.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          cat > android/key.properties <<EOF
          storeFile=../upload-keystore.jks
          storePassword=${STORE_PASSWORD}
          keyAlias=${KEY_ALIAS}
          keyPassword=${KEY_PASSWORD}
          EOF

      - name: Write .env from secrets
        env:
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          GOOGLE_WEB_CLIENT_ID: ${{ vars.GOOGLE_WEB_CLIENT_ID }}
          GOOGLE_IOS_CLIENT_ID: ${{ vars.GOOGLE_IOS_CLIENT_ID }}
          ADS_ENABLED: ${{ vars.ADS_ENABLED }}
          ADMOB_ANDROID_BANNER_ID: ${{ vars.ADMOB_ANDROID_BANNER_ID }}
          ADMOB_IOS_BANNER_ID: ${{ vars.ADMOB_IOS_BANNER_ID }}
        run: |
          {
            echo "SUPABASE_URL=${SUPABASE_URL}"
            echo "SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}"
            echo "GOOGLE_WEB_CLIENT_ID=${GOOGLE_WEB_CLIENT_ID}"
            echo "GOOGLE_IOS_CLIENT_ID=${GOOGLE_IOS_CLIENT_ID}"
            echo "ADS_ENABLED=${ADS_ENABLED:-false}"
            echo "ADMOB_ANDROID_BANNER_ID=${ADMOB_ANDROID_BANNER_ID:-ca-app-pub-4082765898994990/8733289141}"
            echo "ADMOB_IOS_BANNER_ID=${ADMOB_IOS_BANNER_ID}"
          } > .env

      - name: Flutter pub get
        run: flutter pub get

      - name: Run build_runner
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build split-per-ABI release APKs
        run: |
          flutter build apk \
            --release \
            --split-per-abi \
            --build-name="${{ steps.version.outputs.build_name }}" \
            --build-number="${{ steps.version.outputs.build_number }}"

      - name: Verify signing (must NOT be debug key)
        run: |
          APK="build/app/outputs/flutter-apk/app-arm64-v8a-release.apk"
          jarsigner -verify -verbose -certs "$APK" | tee /tmp/jarsigner.log
          if grep -qi "Android Debug" /tmp/jarsigner.log; then
            echo "::error::APK is signed with debug key — check KEYSTORE_BASE64 / key.properties wiring."
            exit 1
          fi

      - name: Rename APKs
        id: rename
        run: |
          OUT_DIR="build/app/outputs/flutter-apk"
          TAG="${{ steps.version.outputs.tag }}"
          mkdir -p dist
          for abi in armeabi-v7a arm64-v8a x86_64; do
            src="${OUT_DIR}/app-${abi}-release.apk"
            dst="dist/bagistruk-${TAG}-${abi}.apk"
            mv "$src" "$dst"
          done
          ls -la dist

      - name: Build release App Bundle
        run: |
          flutter build appbundle \
            --release \
            --build-name="${{ steps.version.outputs.build_name }}" \
            --build-number="${{ steps.version.outputs.build_number }}"

      - name: Verify App Bundle signing (must NOT be debug key)
        run: |
          AAB="build/app/outputs/bundle/release/app-release.aab"
          jarsigner -verify -verbose -certs "$AAB" | tee /tmp/jarsigner-aab.log
          if grep -qi "Android Debug" /tmp/jarsigner-aab.log; then
            echo "::error::AAB is signed with debug key — check KEYSTORE_BASE64 / key.properties wiring."
            exit 1
          fi

      - name: Rename App Bundle
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          cp build/app/outputs/bundle/release/app-release.aab "dist/bagistruk-${TAG}.aab"
          ls -la dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/bagistruk-${{ steps.version.outputs.tag }}-armeabi-v7a.apk
            dist/bagistruk-${{ steps.version.outputs.tag }}-arm64-v8a.apk
            dist/bagistruk-${{ steps.version.outputs.tag }}-x86_64.apk
            dist/bagistruk-${{ steps.version.outputs.tag }}.aab
