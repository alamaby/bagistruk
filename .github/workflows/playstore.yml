name: Build Play Store AAB

on:
  workflow_dispatch:
    inputs:
      build_name:
        description: "Version name (e.g. 1.0.0). Defaults to pubspec.yaml version."
        required: false
        type: string
      build_number:
        description: "Version code (integer). Defaults to GITHUB_RUN_NUMBER."
        required: false
        type: string

permissions:
  contents: read

jobs:
  build:
    name: Build signed Android App Bundle
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Resolve build name & number
        id: version
        run: |
          BUILD_NAME="${{ inputs.build_name }}"
          BUILD_NUMBER="${{ inputs.build_number }}"
          if [ -z "$BUILD_NUMBER" ]; then
            BUILD_NUMBER="${GITHUB_RUN_NUMBER}"
          fi
          echo "build_name=${BUILD_NAME}" >> "$GITHUB_OUTPUT"
          echo "build_number=${BUILD_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Decode upload keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/upload-keystore.jks

      - name: Write android/key.properties
        env:
          KEY_ALIAS: ${{ vars.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          cat > android/key.properties <<EOF
          storeFile=../upload-keystore.jks
          storePassword=${STORE_PASSWORD}
          keyAlias=${KEY_ALIAS}
          keyPassword=${KEY_PASSWORD}
          EOF

      - name: Write .env from secrets
        env:
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          GOOGLE_WEB_CLIENT_ID: ${{ vars.GOOGLE_WEB_CLIENT_ID }}
          GOOGLE_IOS_CLIENT_ID: ${{ vars.GOOGLE_IOS_CLIENT_ID }}
          AUTH_EMAIL_REDIRECT_TO: ${{ vars.AUTH_EMAIL_REDIRECT_TO }}
          ADS_ENABLED: ${{ vars.ADS_ENABLED }}
          ADMOB_ANDROID_BANNER_ID: ${{ vars.ADMOB_ANDROID_BANNER_ID }}
          ADMOB_IOS_BANNER_ID: ${{ vars.ADMOB_IOS_BANNER_ID }}
        run: |
          {
            echo "SUPABASE_URL=${SUPABASE_URL}"
            echo "SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}"
            echo "GOOGLE_WEB_CLIENT_ID=${GOOGLE_WEB_CLIENT_ID}"
            echo "GOOGLE_IOS_CLIENT_ID=${GOOGLE_IOS_CLIENT_ID}"
            echo "AUTH_EMAIL_REDIRECT_TO=${AUTH_EMAIL_REDIRECT_TO:-bagistruk://auth/callback}"
            echo "ADS_ENABLED=${ADS_ENABLED:-false}"
            echo "ADMOB_ANDROID_BANNER_ID=${ADMOB_ANDROID_BANNER_ID:-ca-app-pub-4082765898994990/8733289141}"
            echo "ADMOB_IOS_BANNER_ID=${ADMOB_IOS_BANNER_ID}"
          } > .env

      - name: Validate required app env
        run: |
          missing=()
          for key in SUPABASE_URL SUPABASE_ANON_KEY GOOGLE_WEB_CLIENT_ID; do
            if ! grep -Eq "^${key}=.+" .env; then
              missing+=("$key")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Missing required app env vars: ${missing[*]}. Add them in GitHub Settings > Secrets and variables > Actions."
            exit 1
          fi

      - name: Flutter pub get
        run: flutter pub get

      - name: Run build_runner
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Generate adaptive launcher icons
        run: dart run flutter_launcher_icons

      - name: Build release App Bundle
        run: |
          ARGS=(--release --build-number="${{ steps.version.outputs.build_number }}")
          if [ -n "${{ steps.version.outputs.build_name }}" ]; then
            ARGS+=(--build-name="${{ steps.version.outputs.build_name }}")
          fi
          flutter build appbundle "${ARGS[@]}"

      - name: Verify signing (must NOT be debug key)
        run: |
          AAB="build/app/outputs/bundle/release/app-release.aab"
          jarsigner -verify -verbose -certs "$AAB" | tee /tmp/jarsigner.log
          if grep -qi "Android Debug" /tmp/jarsigner.log; then
            echo "::error::AAB is signed with debug key — check KEYSTORE_BASE64 / key.properties wiring."
            exit 1
          fi

      - name: Rename AAB
        id: rename
        run: |
          mkdir -p dist
          NAME="bagistruk-${{ steps.version.outputs.build_name || 'dev' }}-${{ steps.version.outputs.build_number }}.aab"
          cp build/app/outputs/bundle/release/app-release.aab "dist/${NAME}"
          echo "aab_name=${NAME}" >> "$GITHUB_OUTPUT"
          ls -la dist

      - name: Upload AAB as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.rename.outputs.aab_name }}
          path: dist/${{ steps.rename.outputs.aab_name }}
          retention-days: 30
          if-no-files-found: error

      # When the Play Console service account is ready, add a step here using
      # r0adkll/upload-google-play@v1 with serviceAccountJsonPlainText, packageName,
      # releaseFiles, and track: internal. Until then, download the artifact above
      # and upload to Play Console manually.
